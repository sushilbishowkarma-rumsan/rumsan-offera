  # db:
  #   image: postgres:16-alpine
  #   container_name: offera-db
  #   restart: unless-stopped
  #   environment:
  #     POSTGRES_USER: ${POSTGRES_USER:-offera}
  #     POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
  #     POSTGRES_DB: ${POSTGRES_DB:-offera_db}
  #     DATABASE_URL: postgres://${POSTGRES_USER:-offera}:${POSTGRES_PASSWORD:-secret}@db:5432/${POSTGRES_DB:-offera_db}

  #   volumes:
  #     - pgdata:/var/lib/postgresql/data
  #   ports:
  #     - '5432:5432'
  #   healthcheck:
  #     test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-offera}']
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5

  # ---------------------------------------------------------------------------
  # NestJS API
  # ---------------------------------------------------------------------------

  api:
    container_name: offera-api
    build:
      context: . # always the monorepo root
      dockerfile: Dockerfile.api
      secrets:
        - github_token
    restart: unless-stopped
    env_file:
      - ./apps/api/.env.production # never commit this file
    # depends_on:
    #   db:
    #     condition: service_healthy
    ports:
      - '${API_PORT:-4001}:4001' # remove in prod — reverse proxy handles this

  # ---------------------------------------------------------------------------
  # Next.js Web
  # ---------------------------------------------------------------------------
  web:
    container_name: offera-web
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        # NEXT_PUBLIC_* vars are baked into the JS bundle at build time.
        # They MUST be here as build args — passing them under environment:
        # below has NO effect on these variables.
        NEXT_PUBLIC_SERVER_API: ${NEXT_PUBLIC_SERVER_API}
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID}
        NEXT_PUBLIC_BASE_RUMSAN_URL: ${NEXT_PUBLIC_BASE_RUMSAN_URL}
        NEXT_PUBLIC_BASE_RUMSAN_USER_DEP_URL: ${NEXT_PUBLIC_BASE_RUMSAN_USER_DEP_URL}
    restart: unless-stopped
    env_file:
      - ./apps/web/.env.production # never commit this file
    depends_on:
      - api
    ports:
      - '${WEB_PORT:-3000}:3000' # remove in prod — reverse proxy handles this
secrets:
  github_token:
    environment: GITHUB_TOKEN
volumes:
  pgdata:












